<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MediCore</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body>

<header>
  <div class="brand">
    <div class="logo">D</div>
    <div>
      <h1>MediCore</h1>
      <div class="muted">For Migrant Workers</div>
    </div>
  </div>

  <div class="hdr-actions">
    <button id="doctorBtn" class="btn">Doctor Login</button>
    <button id="patientBtn" class="btn alt">Patient Login</button>
    <button id="resetBtn" class="btn-outline">Reset</button>
  </div>
</header>

<main class="container">
  <div class="card">
    <h2>Dashboard</h2>
    <input id="search" type="text" placeholder="Search patients..." />
    <div id="patientList" class="list"></div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
